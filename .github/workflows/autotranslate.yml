name: Auto Translate GitBook (English to Spanish)

on:
  push:
    branches:
      - main  # Runs when changes are pushed to main in the English repo

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout English Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install google-cloud-translate

      - name: Clone Spanish Repository with Authentication
        run: |
          git clone --branch main https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/grahamPatico/OcuTrap_Knowledge_Base_spanish.git spanish-repo
          cd spanish-repo
          git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/grahamPatico/OcuTrap_Knowledge_Base_spanish.git

      - name: Translate GitBook Content
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: python translate_gitbook.py

      - name: Debug - List Translated Files
        run: |
          ls -R spanish-repo/

      - name: Ensure Git Detects Changes
        run: |
          cd spanish-repo
          git status
          git add .
          git commit -m "Auto-translated GitBook content to Spanish" || echo "No changes to commit"

      - name: Push Translated Files to Spanish Repo (Main Branch)
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          cd spanish-repo
          git push origin main || echo "No changes pushed"

name: Auto Translate Gitbook to Spanish using OpenAI

on:
  push:
    branches: [ main ]

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout English repo
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai==0.28
          
      - name: Run translation script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python translate_gitbook.py

      - name: Clone Spanish repository
        run: |
          git clone https://x-access-token:${{ secrets.MY_PAT }}@github.com/grahamPatico/OcuTrap_Knowledge_Base_spanish.git

      - name: Copy translated files to Spanish repo
        run: |
          rsync -av --delete --exclude='.git' ../OcuTrap_Knowledge_Base_spanish/ OcuTrap_Knowledge_Base_spanish/
          - name: Copy translated files to Spanish repo
  

      - name: Commit and push changes to Spanish repo
        working-directory: OcuTrap_Knowledge_Base_spanish
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add .
          git commit -m "Auto-translated update from OcuTrap_Knowledge_Base" || echo "No changes to commit"
          git push

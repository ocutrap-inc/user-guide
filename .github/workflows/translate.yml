name: Translate Repo to Spanish

on:
  push:
    branches:
      - main

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout English repo
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install googletrans==4.0.0-rc1

      - name: Run translation script
        run: |
          # Adjust the paths if needed.
          python translate_repo.py --src ./ --dest ../OcuTrap_Knowledge_Base_spanish

      - name: Commit and push Spanish repo changes
        working-directory: ../OcuTrap_Knowledge_Base_spanish
        env:
          GIT_USER_NAME: "GitHub Action"
          GIT_USER_EMAIL: "action@github.com"
          # TARGET_REPO_TOKEN should be set as a secret with write access to the Spanish repo.
          TARGET_REPO_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
          git config --global user.email "$GIT_USER_EMAIL"
          git config --global user.name "$GIT_USER_NAME"
          git add .
          git commit -m "Auto translated update" || echo "No changes to commit"
          # Replace the URL below with your Spanish repo URL, embedding the token for authentication.
          git push https://$TARGET_REPO_TOKEN@github.com/yourusername/OcuTrap_Knowledge_Base_spanish.git HEAD:main
